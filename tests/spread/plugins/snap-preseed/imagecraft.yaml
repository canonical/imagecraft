name: snap-preseed-test
version: "0.1"
summary: Test snap-preseed plugin
description: Test snap-preseed plugin
base: bare
build-base: ubuntu@24.04

platforms:
  armhf:
    build-on: [amd64]
    build-for: [armhf]

volumes:
  disk:
    schema: gpt
    structure:
      - name: rootfs
        role: system-data
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        filesystem: ext4
        filesystem-label: writable
        size: 2G

filesystems:
  default:
    - mount: /
      device: (volume/disk/rootfs)

parts:
  snaps:
    plugin: snap-preseed
    snap-preseed-snaps:
      - hello-world/latest/stable
    organize:
      "var/*": (overlay)/var/
