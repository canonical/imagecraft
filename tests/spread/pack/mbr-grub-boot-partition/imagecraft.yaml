name: minimal-with-grub-mbr
version: "0.1"
summary: A test image
description: This image exists purely for testing purposes, yo!
base: bare
build-base: ubuntu@24.04

platforms:
  amd64:

filesystems:
  default:
    - mount: /
      device: (volume/pc/rootfs)
    - mount: /boot/
      device: (volume/pc/boot)

parts:
  # build a simple rootfs
  rootfs:
    plugin: nil
    build-packages: ["mmdebstrap"]
    override-build: |
      mmdebstrap --arch $CRAFT_ARCH_BUILD_FOR \
       --mode=sudo \
       --format=dir \
       --variant=minbase \
       --include=apt \
       noble \
       $CRAFT_PART_INSTALL/ \
       http://archive.ubuntu.com/ubuntu/
      # mmdebstrap filed /dev with special files. Clean it.
      rm -r $CRAFT_PART_INSTALL/dev/*
    organize:
      "*": (overlay)/

  # add packages
  packages:
    plugin: nil
    overlay-packages:
      - ubuntu-server-minimal
      - grub2-common
      - grub-pc
      - linux-image-generic

  # Define a fstab
  fstab:
    plugin: nil
    after: [packages]
    overlay-script: |
      cat << EOF > $CRAFT_OVERLAY/etc/fstab
      LABEL=writable	/	ext4	discard,errors=remount-ro	0	1
      LABEL=boot	/boot	ext4	defaults	0	2
      EOF

volumes:
  pc:
    schema: mbr
    structure:
      - name: boot
        type: "83"
        filesystem: ext4
        role: system-boot
        filesystem-label: boot
        size: 256M
      - name: rootfs
        type: "83"
        filesystem: ext4
        filesystem-label: writable
        role: system-data
        size: 5G
