name: minimal-with-grub-mbr
version: "0.1"
summary: A test image
description: This image exists purely for testing purposes, yo!
base: bare
build-base: ubuntu@24.04

platforms:
  amd64:

filesystems:
  default:
    - mount: /
      device: (volume/pc/rootfs)

parts:
  # build a simple rootfs
  rootfs:
    plugin: nil
    build-packages: ["mmdebstrap"]
    override-build: |
      mmdebstrap --arch $CRAFT_ARCH_BUILD_FOR \
       --mode=sudo \
       --format=dir \
       --variant=minbase \
       --include=apt \
       noble \
       $CRAFT_PART_INSTALL/ \
       http://archive.ubuntu.com/ubuntu/
      # mmdebstrap filled /dev with special files. Clean it.
      rm -r $CRAFT_PART_INSTALL/dev/*
    organize:
      "*": (overlay)/

  # add packages
  packages:
    plugin: nil
    overlay-packages:
      - ubuntu-server-minimal
      - grub2-common
      - grub-pc
      - linux-image-generic

  # Define a fstab
  fstab:
    plugin: nil
    after: [packages]
    overlay-script: |
      cat << EOF > $CRAFT_OVERLAY/etc/fstab
      LABEL=writable / ext4 discard,errors=remount-ro 0 1
      EOF

  # add user to test override-overlay
  test-user:
    plugin: nil
    after: [packages]
    override-overlay: |
      useradd -M -U -r testuser

volumes:
  pc:
    schema: mbr
    structure:
      - name: rootfs
        type: "83"
        filesystem: ext4
        filesystem-label: writable
        role: system-data
        size: 6G
