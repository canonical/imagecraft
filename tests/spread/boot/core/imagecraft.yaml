name: test
version: "0.1"
summary: test
description: test
base: bare
build-base: ubuntu@24.04

platforms:
  arm64:
  amd64:

filesystems:
  default:
    - mount: /
      device: (volume/pc/ubuntu-seed)

parts:
  seed:
    plugin: uc-prepare
    source: .
    uc-prepare-model-assert: model.assert
    uc-prepare-snaps:
      - sentinel.snap
    organize:
      "system-seed/*": (volume/pc/ubuntu-seed)
    prime:
      - -kernel
      - -gadget
      - -resolved-content

volumes:
  pc:
    schema: gpt
    structure:
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        size: 1200M
