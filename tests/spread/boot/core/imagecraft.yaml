name: test
version: "0.1"
summary: test
description: test
base: bare
build-base: ubuntu@24.04

platforms:
  arm64:

filesystems:
  default:
    - mount: /
      device: (volume/pc/ubuntu-seed)

parts:
  seed:
    plugin: uc-prepare
    source: .
    uc-prepare-model-assert: model.assert
    uc-prepare-snaps:
      - sentinel.snap
    override-build: |
      craftctl default
      grub-editenv "$CRAFT_PART_INSTALL"/system-seed/systems/*/grubenv set \
        "snapd_full_cmdline_args=console=tty1 console=ttyAMA0 panic=-1 systemd.default_device_timeout_sec=300"
    organize:
      "system-seed/*": (volume/pc/ubuntu-seed)
    prime:
      - -kernel
      - -gadget
      - -resolved-content

volumes:
  pc:
    schema: gpt
    structure:
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        size: 1200M
      - name: ubuntu-boot
        role: system-boot
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 750M
      - name: ubuntu-save
        role: system-save
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 32M
      - name: ubuntu-data
        role: system-data
        filesystem: ext4
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 1G
