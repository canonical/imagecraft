name: sentinel
version: "0.1"
summary: Say hello and leave
description: Outputs string on startup
base: core24
confinement: devmode
platforms:
  amd64:
  arm64:
    build-on: [arm64, amd64]
    build-for: arm64

apps:
  daemon:
    command: bin/sentinel.sh
    daemon: oneshot
    plugs: [shutdown]

parts:
  scripts:
    plugin: dump
    source: .
    organize:
      bin/sentinel.sh: bin/sentinel.sh
