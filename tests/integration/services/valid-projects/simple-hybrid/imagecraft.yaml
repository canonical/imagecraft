name: simple-project
version: "0.1"
summary: An empty image with a hybrid MBR/GPT partition schema
description: This image has both MBR and GPT partition tables.
base: bare
build-base: devel

platforms:
  amd64:
  arm64:
  riscv64:

filesystems:
  default:
    - mount: /
      device: (volume/disk/ubuntu-seed)

parts:
  my-part:
    plugin: nil

volumes:
  disk:
    # Copied and modified from the Raspberry Pi gadget.
    # https://github.com/canonical/pi-gadget/blob/24/gadget.yaml
    schema: mbr,gpt
    structure:
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        type: 0C,C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        size: 1200M
      - name: ubuntu-boot
        role: system-boot
        filesystem: vfat
        type: 0C,C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        size: 750M
      - name: ubuntu-save
        role: system-save
        filesystem: ext4
        type: 83,0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 32M
      - name: ubuntu-data
        role: system-data
        filesystem: ext4
        type: 83,0FC63DAF-8483-4772-8E79-3D69D8477DE4
        size: 1500M
