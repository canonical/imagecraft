name: simple-project
version: "0.1"
summary: An empty image with MBR partitions
description: This image has MBR partitions! Fancy?
base: bare
build-base: devel

platforms:
  amd64:
  arm64:
  riscv64:

filesystems:
  default:
    - mount: /
      device: (volume/disk/ubuntu-seed)

parts:
  my-part:
    plugin: nil

volumes:
  disk:
    # Copied and modified from the Raspberry Pi gadget:
    # https://github.com/canonical/pi-gadget/blob/24/gadget.yaml
    schema: mbr
    structure:
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        type: 0C
        size: 1200M
      - name: ubuntu-boot
        role: system-boot
        filesystem: vfat
        type: 0C
        size: 750M
      - name: ubuntu-save
        role: system-save
        filesystem: ext4
        type: "83"
        size: 32M
      - name: ubuntu-data
        role: system-data
        filesystem: ext4
        type: "83"
        # XXX: make auto-grow to partition
        size: 1500M
