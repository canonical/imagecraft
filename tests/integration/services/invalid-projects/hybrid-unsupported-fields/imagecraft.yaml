name: simple-project
version: "0.1"
summary: An image that uses unsupported volume structure fields in a hybrid MBR/GPT schema.
description: |
  The `content` and `min-size` keys in the volume schema are not supported by Imagecraft.
  Because they are supported by other tools like snapd, we explicitly error out when these
  fields are included in the file.
base: bare
build-base: devel

platforms:
  amd64:
  arm64:
  riscv64:

filesystems:
  default:
    - mount: /
      device: (volume/disk/ubuntu-seed)

parts:
  my-part:
    plugin: nil

volumes:
  disk:
    schema: mbr,gpt
    structure:
      - name: ubuntu-seed
        role: system-seed
        filesystem: vfat
        type: 0C,C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        min-size: 1G # Not supported!
        size: 1200M
        content: # This field is not supported!
          - source: boot-assets/
            target: /
