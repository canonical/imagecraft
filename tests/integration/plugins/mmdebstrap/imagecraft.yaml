name: mmdebstrap-test
version: "0.1"
summary: Test mmdebstrap plugin
description: Test mmdebstrap plugin
base: bare
build-base: ubuntu@24.04
platforms:
  amd64:
  arm64:

parts:
  rootfs:
    plugin: mmdebstrap
    organize:
      "*": (overlay)/

volumes:
  pc:
    schema: gpt
    structure:
      - name: rootfs
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        filesystem: ext4
        filesystem-label: writable
        role: system-data
        size: 512M

filesystems:
  default:
    - mount: /
      device: (volume/pc/rootfs)
