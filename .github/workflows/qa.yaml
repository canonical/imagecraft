name: QA
on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "hotfix/*"
      - "release/*"
      - "renovate/*"
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  filter:
    runs-on: ubuntu-slim
    outputs:
      source-files: ${{ steps.filter.outputs.source-files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Combine multiple negation checks into a union (¬A ∧ ¬B ∧ ¬C), because individual entries are checked independently (A ∨ B ∨ C).
          # If we ever need to filter only for docs, glob 'docs/**/*' and '**/*.md'
          filters: |
            source-files:
              - '!({docs/**,*.md,**/*.md,.readthedocs.yaml})'
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
  test:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      fast-test-platforms: '["jammy", "noble", "ubuntu-26.04", "ubuntu-26.04-arm"]'
      slow-test-platforms: '["jammy", "ubuntu-26.04", "ubuntu-26.04-arm"]'
